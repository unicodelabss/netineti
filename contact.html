<section class="pt-32 pb-20 px-6 max-w-3xl mx-auto">
    <div class="text-center mb-12">
        <h1 class="text-5xl font-black uppercase mb-4">Let's <span class="text-red-600">Create</span></h1>
        <p class="text-zinc-400 uppercase tracking-widest text-sm">Tell us about your project</p>
    </div>
    
    <form class="space-y-8">
        <div class="grid md:grid-cols-2 gap-8">
            <input type="text" placeholder="Full Name" class="w-full bg-transparent border-b border-zinc-700 py-4 focus:outline-none focus:border-red-600 transition">
            <input type="email" placeholder="Email Address" class="w-full bg-transparent border-b border-zinc-700 py-4 focus:outline-none focus:border-red-600 transition">
        </div>
        <select class="w-full bg-transparent border-b border-zinc-700 py-4 focus:outline-none focus:border-red-600 transition">
            <option class="bg-zinc-900">Project Type</option>
            <option class="bg-zinc-900">Music Video</option>
            <option class="bg-zinc-900">Commercial Ad</option>
            <option class="bg-zinc-900">Short Film</option>
        </select>
        <textarea placeholder="Tell us more about your vision..." rows="4" class="w-full bg-transparent border-b border-zinc-700 py-4 focus:outline-none focus:border-red-600 transition"></textarea>
        
        <button class="w-full py-5 bg-red-600 font-bold uppercase tracking-[0.2em] hover:bg-white hover:text-black transition duration-500">Send Inquiry</button>
    </form>
</section>
